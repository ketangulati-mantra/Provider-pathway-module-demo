server {
    listen 80;
    server_name _;
    
    location /provider_pathways {
        alias /usr/share/nginx/html/provider_pathways;
        try_files $uri $uri/ /provider_pathways/index.html;
    }

    # Redirect root to subpath (optional fallback)
    location = / {
        return 301 /provider_pathways/;
    }
}
